version: 2

# Default optional secrets so templates referencing them resolve even when the
# var is unset (e.g. `make release-snapshot`, where no tap token is exported).
env:
  - RELEASE_GITHUB_TOKEN={{ envOrDefault "RELEASE_GITHUB_TOKEN" "" }}

before:
  hooks:
    - go mod tidy
    # Built from a local host binary, not a cross-compile — same man pages
    # end up in every archive regardless of GOOS.
    - sh -c 'go run . man -o ./man'

builds:
  - id: emailable
    main: .
    binary: emailable
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/emailable/emailable-cli/cmd.version={{ .Version }}
      - -X github.com/emailable/emailable-cli/cmd.commit={{ .ShortCommit }}
      - -X github.com/emailable/emailable-cli/cmd.buildDate={{ time "2006-01-02" }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: emailable
    ids:
      - emailable
    name_template: "emailable_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    # Bare-tarball users can copy man/*.1 onto their MANPATH.
    files:
      - LICENSE
      - README.md
      - man/*.1

nfpms:
  - id: emailable
    ids:
      - emailable
    package_name: emailable
    vendor: Emailable
    homepage: https://emailable.com
    maintainer: Emailable <support@emailable.com>
    description: Official command-line interface for the Emailable API.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      # nfpm expands globs, so this picks up every generated page without a
      # per-command list to keep in sync (unlike the Homebrew cask below).
      - src: ./man/*.1
        dst: /usr/share/man/man1/

checksum:
  name_template: "checksums.txt"

notarize:
  macos:
    - enabled: '{{ not .IsSnapshot }}'
      ids:
        - emailable
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  use: github-native

release:
  draft: true
  prerelease: auto

homebrew_casks:
  - name: emailable
    ids:
      - emailable
    binaries:
      - emailable
    repository:
      owner: emailable
      name: homebrew-tap
      token: "{{ .Env.RELEASE_GITHUB_TOKEN }}"
    homepage: "https://emailable.com"
    description: "Official command-line interface for the Emailable API"
    skip_upload: auto
    # Globs aren't supported — list each page explicitly. Regenerate this
    # list when a top-level command is added or removed.
    manpages:
      - man/emailable.1
      - man/emailable-account.1
      - man/emailable-account-status.1
      - man/emailable-batch.1
      - man/emailable-batch-get.1
      - man/emailable-batch-verify.1
      - man/emailable-login.1
      - man/emailable-logout.1
      - man/emailable-skill.1
      - man/emailable-skill-install.1
      - man/emailable-skill-print.1
      - man/emailable-skill-targets.1
      - man/emailable-status.1
      - man/emailable-verify.1
      - man/emailable-version.1

scoops:
  - name: emailable
    ids:
      - emailable
    repository:
      owner: emailable
      name: scoop-bucket
      # Same PAT as the Homebrew cask above; needs `contents:write` on both
      # the homebrew-tap and scoop-bucket repos.
      token: "{{ .Env.RELEASE_GITHUB_TOKEN }}"
    homepage: https://emailable.com
    description: Official command-line interface for the Emailable API.
    license: MIT
    # Skip the upload when the token is missing so `make release-snapshot`
    # and the first release (before the bucket repo exists) keep working.
    skip_upload: '{{ if eq .Env.RELEASE_GITHUB_TOKEN "" }}true{{ else }}auto{{ end }}'
